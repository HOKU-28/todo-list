<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0fdf4;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background-color: #ffffff;
      width: 100%;
      max-width: 520px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      padding: 32px;
    }

    h1 {
      color: #166534;
      font-size: 28px;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    #taskInput {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #bbf7d0;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
      color: #14532d;
    }

    #taskInput::placeholder {
      color: #86efac;
    }

    #taskInput:focus {
      border-color: #22c55e;
    }

    #categorySelect {
      padding: 12px 14px;
      border: 2px solid #bbf7d0;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      color: #14532d;
      background-color: #ffffff;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    #categorySelect:focus {
      border-color: #22c55e;
    }

    #addBtn {
      background-color: #22c55e;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    #addBtn:hover {
      background-color: #16a34a;
    }

    #addBtn:active {
      transform: scale(0.97);
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      min-height: 36px;
    }

    .remaining-count {
      font-size: 14px;
      color: #15803d;
      font-weight: 500;
    }

    #clearCompletedBtn {
      background-color: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      display: none;
    }

    #clearCompletedBtn:hover {
      background-color: #fee2e2;
    }

    #clearCompletedBtn.visible {
      display: inline-block;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background-color: #f0fdf4;
      border-radius: 10px;
      margin-bottom: 10px;
      transition: background-color 0.2s;
    }

    li:hover {
      background-color: #dcfce7;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #22c55e;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background-color 0.2s;
    }

    .checkbox:hover {
      background-color: #bbf7d0;
    }

    .checkbox.checked {
      background-color: #22c55e;
    }

    .checkbox.checked::after {
      content: "\2713";
      color: #ffffff;
      font-size: 14px;
      font-weight: bold;
    }

    .task-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .task-text {
      font-size: 16px;
      color: #14532d;
      word-break: break-word;
    }

    .task-text.completed {
      text-decoration: line-through;
      color: #86efac;
    }

    .category-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      width: fit-content;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .category-work {
      background-color: #dbeafe;
      color: #1e40af;
    }

    .category-personal {
      background-color: #f3e8ff;
      color: #7e22ce;
    }

    .category-urgent {
      background-color: #fee2e2;
      color: #b91c1c;
    }

    .delete-btn {
      background-color: transparent;
      border: none;
      color: #ef4444;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background-color 0.2s;
      flex-shrink: 0;
      line-height: 1;
    }

    .delete-btn:hover {
      background-color: #fee2e2;
    }

    .empty-state {
      text-align: center;
      color: #86efac;
      padding: 28px 0;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Tasks</h1>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." autocomplete="off" />
      <select id="categorySelect">
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
        <option value="Urgent">Urgent</option>
      </select>
      <button id="addBtn">Add</button>
    </div>
    <div class="actions">
      <span class="remaining-count" id="remainingCount"></span>
      <button id="clearCompletedBtn">Clear Completed</button>
    </div>
    <ul id="taskList"></ul>
  </div>

  <script>
    const taskInput = document.getElementById("taskInput");
    const categorySelect = document.getElementById("categorySelect");
    const addBtn = document.getElementById("addBtn");
    const taskList = document.getElementById("taskList");
    const remainingCount = document.getElementById("remainingCount");
    const clearCompletedBtn = document.getElementById("clearCompletedBtn");

    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function getCategoryClass(category) {
      if (category === "Work") return "category-work";
      if (category === "Personal") return "category-personal";
      if (category === "Urgent") return "category-urgent";
      return "category-work";
    }

    function render() {
      taskList.innerHTML = "";

      if (tasks.length === 0) {
        taskList.innerHTML = "<div class=\"empty-state\">No tasks yet. Add one above!</div>";
        remainingCount.textContent = "";
        clearCompletedBtn.classList.remove("visible");
        return;
      }

      tasks.forEach((task, index) => {
        const li = document.createElement("li");

        const checkbox = document.createElement("div");
        checkbox.className = "checkbox" + (task.completed ? " checked" : "");
        checkbox.addEventListener("click", () => toggleTask(index));

        const info = document.createElement("div");
        info.className = "task-info";

        const span = document.createElement("span");
        span.className = "task-text" + (task.completed ? " completed" : "");
        span.textContent = task.text;

        const badge = document.createElement("span");
        badge.className = "category-badge " + getCategoryClass(task.category);
        badge.textContent = task.category || "Work";

        info.appendChild(span);
        info.appendChild(badge);

        const delBtn = document.createElement("button");
        delBtn.className = "delete-btn";
        delBtn.innerHTML = "&times;";
        delBtn.title = "Delete task";
        delBtn.addEventListener("click", () => deleteTask(index));

        li.appendChild(checkbox);
        li.appendChild(info);
        li.appendChild(delBtn);
        taskList.appendChild(li);
      });

      const remaining = tasks.filter((t) => !t.completed).length;
      remainingCount.textContent = remaining + " task" + (remaining !== 1 ? "s" : "") + " remaining";

      const hasCompleted = tasks.some((t) => t.completed);
      clearCompletedBtn.classList.toggle("visible", hasCompleted);
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;

      tasks.push({ text, completed: false, category: categorySelect.value });
      taskInput.value = "";
      saveTasks();
      render();
    }

    function toggleTask(index) {
      tasks[index].completed = !tasks[index].completed;
      saveTasks();
      render();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      saveTasks();
      render();
    }

    function clearCompleted() {
      tasks = tasks.filter((t) => !t.completed);
      saveTasks();
      render();
    }

    addBtn.addEventListener("click", addTask);

    taskInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        addTask();
      }
    });

    clearCompletedBtn.addEventListener("click", clearCompleted);

    render();
  </script>
</body>
</html>
